<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>
      {% if page.title %} {{ page.title }} | python-cookbooks {% else %}
      python-cookbooks {% endif %}
    </title>

    <style>
      :root {
        --bg: #1e1e1e;
        --text: #e6e6e6;
        --python-blue: #3776ab;
        --python-yellow: #ffd343;
        --link: #4fa3ff;
        --border: #666666;
        --code-bg: #2d333b;
      }

      body {
        background-color: var(--bg);
        color: var(--text);

        max-width: 900px;
        margin: 0 auto;
        padding: 2rem;

        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;

        line-height: 1.6;
      }

      header {
        margin-bottom: 2rem;
        border-bottom: 1px solid var(--border);
        padding-bottom: 1rem;
      }

      .site-title {
        font-size: 1.75rem;
        font-weight: 600;
        text-decoration: none;
        color: var(--python-blue);
      }

      .site-title:hover {
        text-decoration: underline;
      }

      h1,
      h2,
      h3,
      h4,
      h5,
      h6 {
        color: var(--python-yellow);
      }

      a {
        color: var(--link);
      }

      a:hover {
        text-decoration: underline;
      }

      hr {
        border: 0;
        border-top: 1px solid var(--border);
        margin: 2rem 0;
      }

      pre {
        background-color: var(--code-bg);
        padding: 1rem;
        border-radius: 8px;
        overflow-x: auto;
      }

      code {
        color: var(--python-yellow);
      }

      pre code {
        color: var(--text);
      }

      blockquote {
        border-left: 4px solid var(--python-blue);
        padding-left: 1rem;
        margin-left: 0;
        color: #cccccc;
      }
    </style>
  </head>

  <body>
    <header>
      <a class="site-title" href="{{ '/' | relative_url }}">
        python-cookbooks
      </a>
    </header>

    <main>{{ content }}</main>
  </body>
</html>
